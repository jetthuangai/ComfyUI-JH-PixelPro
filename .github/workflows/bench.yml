name: Expanded bench (multi-snapshot v1)

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install system libraries for MediaPipe
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0 libgles2 libegl1

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || (pip install -e . && pip install pytest ruff)

      - name: Run expanded bench suite (report-only, full 23-file multi-snapshot v1)
        run: pytest tests/bench_*.py -v

      - name: Upload bench artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-log
          path: tests/bench_baselines/
