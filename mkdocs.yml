site_name: ComfyUI-JH-PixelPro
site_description: GPU-powered pro-grade image suite for ComfyUI.
site_url: https://jetthuangai.github.io/ComfyUI-JH-PixelPro/
repo_url: https://github.com/jetthuangai/ComfyUI-JH-PixelPro
repo_name: jetthuangai/ComfyUI-JH-PixelPro

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search
  - mermaid2

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Examples:
      - Overview: examples/index.md
      - LUT Preset Gallery: examples/lut-preset-gallery.md
      - Skin Tone Retouch Chain: examples/skin-tone-retouch.md
  - Flagship Nodes:
      - N-29 Alpha Matte Extractor: nodes/n29-alpha-matte-extractor.md
      - N-33 Mask Edge Smoother: nodes/n33-mask-edge-smoother.md
      - N-10 Face Detect: nodes/n10-face-detect.md
  - Categories:
      - Color:
          - Overview: categories/color.md
          - N-05 Luminosity Masking: nodes/luminosity-masking.md
          - N-08 Color Matcher: nodes/color-matcher.md
          - N-09 Tone Curve: nodes/tone-curve.md
          - N-12 HALD Identity: nodes/hald-identity.md
          - N-13 LUT Export: nodes/lut-export.md
          - N-14 LUT Import: nodes/lut-import.md
          - N-15 Hue/Saturation Range: nodes/hue-saturation-range.md
          - N-16 Saturation Mask: nodes/saturation-mask.md
          - N-17 Tone Match LUT: nodes/tone-match-lut.md
          - N-23 ColorLab: nodes/color-lab.md
