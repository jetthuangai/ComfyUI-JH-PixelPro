site_name: ComfyUI-JH-PixelPro
site_description: GPU-powered pro-grade image suite for ComfyUI.
site_url: https://jetthuangai.github.io/ComfyUI-JH-PixelPro/
repo_url: https://github.com/jetthuangai/ComfyUI-JH-PixelPro
repo_name: jetthuangai/ComfyUI-JH-PixelPro

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search
  - mermaid2

nav:
  - Home: index.md
  - Flagship Nodes:
      - N-29 Alpha Matte Extractor: nodes/n29-alpha-matte-extractor.md
      - N-33 Mask Edge Smoother: nodes/n33-mask-edge-smoother.md
      - N-10 Face Detect: nodes/n10-face-detect.md
  - Categories:
      - Color: categories/color.md
      - Compositing: categories/compositing.md
      - Filters: categories/filters.md
      - Mask: categories/mask.md
      - Geometry: categories/geometry.md
      - Face: categories/face.md
      - Looks: categories/looks.md
  - Reference:
      - Smoke Test Matrix: smoke-test-matrix.md
